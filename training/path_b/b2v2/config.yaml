# Path B2-V2 — daily quantile emulator + variance-propagated stacking
# Authority: training/path_b/PLAN_B2_V2.md
# Frozen B2 package is read-only reference; do not overwrite b2/ artifacts.

run:
  seed: 42
  n_jobs: -1
  n_trials: 50
  stage1_n_trials: 20
  stage1_tail_n_trials: 10
  auc_tie_eps: 0.005
  es_rounds: 80
  n_estimators_max: 4000
  stage1_n_estimators: 500
  stage1_es_rounds: 50
  lgbm_device: auto
  catboost_task_type: CPU
  catboost_boosting_type: Ordered
  catboost_boosting_fallback: Plain
  bootstrap_n: 2000
  bootstrap_ci: 0.95
  oof_folds: 5
  green_fuse: true
  quantiles: [0.1, 0.5, 0.9]

paths:
  watch_green: data/processed/features/watch_green.parquet
  watch_daily: data/processed/features/watch_daily.parquet
  cgm_daily: data/processed/features/cgm_daily.parquet
  onboarding: data/processed/features/onboarding.parquet
  mood: data/processed/features/mood.parquet
  cgm_person: data/processed/features/cgm_person.parquet
  pool_masks: data/processed/meta/pool_masks.parquet
  path_a_blocks_config: training/path_a_blocks/config.yaml
  # Pin HPO/spaces to frozen B2 config (not live path_a_blocks drift)
  frozen_b2_config: training/path_b/b2/config.yaml
  artifacts_root: training/path_b/b2v2/artifacts
  frozen_c1_run_id: mood_scores_20260714_014415
  frozen_c1_artifacts: training/path_a_blocks/artifacts

data:
  expected_n_core: 1824
  expected_n_aux: 1685
  expected_c1_n_feat: 47
  id_col: person_id
  label_col: label
  split_col: recommended_split
  day_key: day_local
  # Reduced primary Y (PLAN_B2_V2 §3.2)
  glu_targets_daily:
    - cgm_mean
    - cgm_sd
    - cgm_tir_70_180
    - cgm_tar_180
  glu_targets_person:
    - cgm_mean_daymean
    - cgm_sd_daymean
    - cgm_tir_70_180_daymean
    - cgm_tar_180_daymean
  # short names used in yhat_ columns (aligned to daily)
  glu_short:
    - mean
    - sd
    - tir
    - tar
  day_watch_feats:
    - hr_mean
    - hr_sd
    - hr_min
    - hr_max
    - hr_nocturnal_mean
    - hr_day_mean
    - stress_mean
    - stress_sd
    - stress_pct_medium_plus
    - stress_pct_high
    - rr_mean
    - rr_sd
    - sleep_duration_hours
    - sleep_n_bouts
    - steps_sum
    - mvpa_min
    - light_min
    - sedentary_min
  # Never Stage-1 targets / Stage-2 features (CGM coverage + day meta)
  # Note: GREEN person hr_n/stress_n are Path A W0/C1 columns — allowed at Stage-2.
  # Day-level count channels are simply omitted from day_watch_feats (not listed).
  glu_forbid:
    - n_valid_days
    - cgm_n_total
    - n_days
    - cgm_n
    - watch_day_valid
    - cgm_day_valid
    - n_days_agg
  pred_prefix: "yhat_"
  true_prefix: "ytrue_"
  green_prefix: "g_"

class_weights:
  lightgbm: balanced
  catboost: Balanced

calibration:
  default_method: sigmoid
  secondary_method: isotonic
  min_pos_for_isotonic: 30

# Identical to frozen B2 / path_a_blocks (PLAN_B2_V2 pin)
hpo:
  lightgbm:
    learning_rate: [0.01, 0.1]
    num_leaves: [8, 48]
    max_depth: [3, 8]
    min_child_samples: [10, 80]
    min_split_gain: [0.5, 8.0]
    colsample_bytree: [0.25, 0.70]
    subsample: [0.5, 1.0]
    subsample_freq: [1, 7]
    reg_alpha: [1.0e-3, 10.0]
    reg_lambda: [1.0e-3, 10.0]
  catboost:
    learning_rate: [0.01, 0.1]
    depth: [4, 8]
    l2_leaf_reg: [1.0, 30.0]
    random_strength: [0.0, 2.0]
    bagging_temperature: [0.0, 2.0]
    min_data_in_leaf: [5, 50]
    border_count: [32, 128]

# Stage-1 default / baseline params (before Optuna)
stage1_default:
  learning_rate: 0.05
  num_leaves: 31
  max_depth: 6
  min_child_samples: 20
  min_split_gain: 0.5
  colsample_bytree: 0.5
  subsample: 0.8
  subsample_freq: 1
  reg_alpha: 0.1
  reg_lambda: 1.0

frozen_c1_reference:
  test_macro_ovr_auc: 0.7378
  test_binary_auc: 0.8309
  test_macro_auprc: 0.4687470484302076
  family: catboost

frozen_w0_reference:
  test_macro_ovr_auc: 0.6662
  test_binary_auc: 0.6889

decision_bars:
  d1_freeze_drift_tol: 0.01
  oracle_headroom_pass: 0.02
  oracle_kill: 0.01
  stage1_r2_targets:
    - mean
    - sd
    - tar
  stage1_early_kill_mean_r2: 0.10
  stage1_early_kill_any_r2: 0.12
  coverage_lo: 0.60
  coverage_hi: 0.95
  coverage_min_targets: 2
